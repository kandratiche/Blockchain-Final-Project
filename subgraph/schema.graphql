"""
A player — any address that has interacted with the protocol.
"""
type Player @entity {
  "Player address (lowercase hex)."
  id: ID!
  "Total swaps executed by this player."
  totalSwaps: BigInt!
  "Total items crafted by this player."
  totalCrafts: BigInt!
  swaps: [Swap!]! @derivedFrom(field: "trader")
  crafts: [Craft!]! @derivedFrom(field: "player")
  rentalsAsOwner: [Rental!]! @derivedFrom(field: "owner")
  proposalsCreated: [Proposal!]! @derivedFrom(field: "proposer")
}

"""
An AMM resource pool, keyed by its on-chain pool key.
"""
type Pool @entity {
  "keccak256 pool key (hex)."
  id: ID!
  tokenA: BigInt!
  tokenB: BigInt!
  reserveA: BigInt!
  reserveB: BigInt!
  totalShares: BigInt!
  swapCount: BigInt!
}

"""
A single AMM swap.
"""
type Swap @entity(immutable: true) {
  id: ID!
  pool: Pool!
  trader: Player!
  tokenIn: BigInt!
  amountIn: BigInt!
  amountOut: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
An item crafted through the CraftingEngine.
"""
type Craft @entity(immutable: true) {
  id: ID!
  player: Player!
  recipeId: BigInt!
  equipmentTokenId: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

"""
An equipment-NFT rental in the NFTRentalVault.
"""
type Rental @entity {
  id: ID!
  equipmentId: BigInt!
  owner: Player!
  renter: Bytes
  pricePaid: BigInt!
  expires: BigInt!
  active: Boolean!
  timestamp: BigInt!
}

"""
A governance proposal and its running tally.
"""
type Proposal @entity {
  "Governor proposalId (decimal string)."
  id: ID!
  proposer: Player!
  description: String!
  voteStart: BigInt!
  voteEnd: BigInt!
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  executed: Boolean!
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

"""
A single vote cast on a proposal.
"""
type Vote @entity(immutable: true) {
  id: ID!
  proposal: Proposal!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  timestamp: BigInt!
}
